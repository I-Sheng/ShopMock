# ShopMock CI/CD
#
# CI (PRs + main): storefront build, Django image checks, seed SQL validation,
# compose config sanity.
# CD (main only): push images to GHCR, then deploy to the lab host via a
# self-hosted runner. The deploy job is opt-in: set the repository variable
# DEPLOY_ENABLED=true after registering a runner on the lab machine with
# labels [self-hosted, shopmock] (Settings -> Actions -> Runners).
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  storefront:
    name: Storefront build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: storefront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: storefront/package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Internal backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the real image, then run Django's system checks inside it —
      # dependencies install in Docker only, and CI exercises the shipped artifact.
      - run: docker build -t internal-service-backend:ci ./internal-service-backend
      # The backend needs PGRST_JWT_SECRET at import time. Load it from the
      # committed .env.example rather than inlining the key in this workflow;
      # CI never sees the real .env.
      - run: |
          set -a; . ./.env.example; set +a
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci-dummy \
            -e INTERNAL_BACKEND_DB_PASSWORD=ci-dummy \
            -e PGRST_JWT_SECRET \
            internal-service-backend:ci python manage.py check

  seed-sql:
    name: Seed SQL validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [customer, catalog, orders, finance]
    steps:
      - uses: actions/checkout@v4
      # Boot a throwaway Postgres with the seed dir mounted; the image runs
      # every init file, so a syntax error or bad grant fails the job.
      - run: |
          cid=$(docker run -d \
            -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=ci \
            -e POSTGRES_DB=${{ matrix.db }} \
            -e INTERNAL_BACKEND_DB_PASSWORD=ci-dummy \
            -v "$PWD/seed/${{ matrix.db }}-db:/docker-entrypoint-initdb.d:ro" \
            postgres:16-alpine)
          for i in $(seq 1 60); do
            if docker logs "$cid" 2>&1 | grep -q 'PostgreSQL init process complete'; then
              break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' "$cid")" = "false" ]; then
              echo '::error::init container exited early'; docker logs "$cid"; exit 1
            fi
            sleep 2
          done
          docker logs "$cid" 2>&1 | tee /tmp/init.log
          if ! grep -q 'PostgreSQL init process complete' /tmp/init.log; then
            echo '::error::init never completed'; exit 1
          fi
          if grep -E 'ERROR|FATAL' /tmp/init.log; then
            echo '::error::seed SQL raised errors'; exit 1
          fi

  compose:
    name: Compose config sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env && docker compose config -q

  publish:
    name: Publish images to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [storefront, backend, seed-sql, compose]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - { name: storefront, context: ./storefront }
          - { name: internal-service-backend, context: ./internal-service-backend }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: repo
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/shopmock-${{ matrix.image.name }}:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/shopmock-${{ matrix.image.name }}:${{ github.sha }}

  deploy:
    name: Deploy to lab host
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [publish]
    runs-on: [self-hosted, shopmock]
    steps:
      - uses: actions/checkout@v4
      # .env is never in git: the runner host must provide it. Point
      # SHOPMOCK_ENV_FILE at the lab's .env (e.g. a runner env var) or place
      # .env in the checkout before this step.
      - run: ./scripts/deploy.sh
        env:
          SHOPMOCK_ENV_FILE: ${{ vars.SHOPMOCK_ENV_FILE }}
