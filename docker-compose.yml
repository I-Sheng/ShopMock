# ShopMock lab infrastructure — see ./INFRA_BUILD_SPEC.md
# Every service maps to a real, pullable image (spec §1).
# Networks realize the tier/blast-radius segmentation (spec §2);
# the *-db networks are `internal: true` so DBs are unreachable from the edge.

name: shopmock

x-pg-common: &pg-common
  image: postgres:16-alpine
  restart: unless-stopped
  networks: [data_net]
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}

x-pgrst-common: &pgrst-common
  image: postgrest/postgrest:v12.2.0
  restart: unless-stopped

services:
  # ---------------- DMZ / Edge ----------------
  edge:
    image: traefik:v3.6   # v3.0's Docker client speaks API <1.44, rejected by Docker Engine 29+
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"       # public storefront + APIs (standard HTTP)
      - "8088:8080"   # traefik dashboard (lab only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [edge_net, tier1_net, tier2_net]

  storefront:                       # Next.js customer-facing shop UI
    build: ./storefront
    restart: unless-stopped
    environment:
      CATALOG_BASE: http://edge     # server-side catalog reads go back through the DMZ edge
    networks: [edge_net]
    labels:
      traefik.enable: "true"
      traefik.http.routers.storefront.rule: "PathPrefix(`/`)"
      traefik.http.routers.storefront.priority: "1"
      traefik.http.services.storefront.loadbalancer.server.port: "3000"

  search:
    image: opensearchproject/opensearch:2.13.0
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
    networks: [edge_net]

  search-dashboard:
    image: opensearchproject/opensearch-dashboards:2.13.0
    restart: unless-stopped
    environment:
      OPENSEARCH_HOSTS: '["https://search:9200"]'
    ports: ["5602:5601"]
    networks: [edge_net]
    depends_on: [search]

  # ---------------- Tier 1 — Critical Services ----------------
  identity:                         # Keycloak — the "key of the kingdom"
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    # --proxy-headers=xforwarded: trust Traefik's X-Forwarded-* so Keycloak builds
    # login/redirect URLs as http://localhost/auth (same-origin with the storefront).
    command: ["start-dev", "--import-realm", "--http-port=8080", "--proxy-headers=xforwarded"]
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth   # serve the whole server under /auth (public login flow)
    volumes:
      - ./seed/identity:/opt/keycloak/data/import:ro,z
    ports:
      - "8081:8080"                 # admin console (treat as mgmt-only)
    networks: [tier1_net, mgmt_net]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier1_net  # else Traefik may pick the mgmt_net IP it can't reach
      # Public login/registration/token endpoints, same-origin at /auth.
      traefik.http.routers.auth.rule: "PathPrefix(`/auth`)"
      traefik.http.routers.auth.priority: "10"
      traefik.http.services.auth.loadbalancer.server.port: "8080"
      # The admin console/API stays mgmt-only: a higher-priority router matches
      # /auth/admin first and an ip-allowlist middleware (RFC5737 TEST-NET, never a
      # real client) rejects every public request. Admins reach it via :8081/bastion.
      traefik.http.routers.auth-admin.rule: "PathPrefix(`/auth/admin`)"
      traefik.http.routers.auth-admin.priority: "100"
      traefik.http.routers.auth-admin.service: "auth"
      traefik.http.routers.auth-admin.middlewares: "auth-admin-block"
      traefik.http.middlewares.auth-admin-block.ipallowlist.sourcerange: "192.0.2.1/32"

  catalog-svc:
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:catalog_pgrst_pw@catalog-db:5432/catalog
      PGRST_DB_SCHEMAS: catalog
      PGRST_DB_ANON_ROLE: web_anon
    networks: [tier1_net, data_net]
    depends_on: [catalog-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier1_net  # else Traefik may pick the data_net IP it can't reach
      traefik.http.routers.catalog.rule: "PathPrefix(`/api/catalog`)"
      traefik.http.routers.catalog.middlewares: "catalog-strip"
      traefik.http.middlewares.catalog-strip.stripprefix.prefixes: "/api/catalog"
      traefik.http.services.catalog.loadbalancer.server.port: "3000"

  order-svc:
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:orders_pgrst_pw@orders-db:5432/orders
      PGRST_DB_SCHEMAS: sales
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}   # verify Keycloak RS256 tokens
      PGRST_JWT_ROLE_CLAIM_KEY: .role         # token's `role` claim -> DB role
    networks: [tier1_net, data_net]
    depends_on: [orders-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier1_net
      traefik.http.routers.orders.rule: "PathPrefix(`/api/orders`)"
      traefik.http.routers.orders.middlewares: "orders-strip"
      traefik.http.middlewares.orders-strip.stripprefix.prefixes: "/api/orders"
      traefik.http.services.orders.loadbalancer.server.port: "3000"

  checkout-svc:                     # checkout / payment — finance-db (PCI scope)
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:finance_pgrst_pw@finance-db:5432/finance
      PGRST_DB_SCHEMAS: finance
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}   # verify Keycloak RS256 tokens
      PGRST_JWT_ROLE_CLAIM_KEY: .role         # token's `role` claim -> DB role
    networks: [tier1_net, data_net]
    depends_on: [finance-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier1_net
      traefik.http.routers.checkout.rule: "PathPrefix(`/api/checkout`)"
      traefik.http.routers.checkout.middlewares: "checkout-strip"
      traefik.http.middlewares.checkout-strip.stripprefix.prefixes: "/api/checkout"
      traefik.http.services.checkout.loadbalancer.server.port: "3000"

  customer-svc:                     # customer PII — only the ensure_customer() RPC is reachable
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:customer_pgrst_pw@customer-db:5432/customer
      PGRST_DB_SCHEMAS: commerce
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}   # verify Keycloak RS256 tokens
      PGRST_JWT_ROLE_CLAIM_KEY: .role         # token's `role` claim -> DB role
    networks: [tier1_net, data_net]
    depends_on: [customer-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier1_net
      traefik.http.routers.customer.rule: "PathPrefix(`/api/customers`)"
      traefik.http.routers.customer.middlewares: "customer-strip"
      traefik.http.middlewares.customer-strip.stripprefix.prefixes: "/api/customers"
      traefik.http.services.customer.loadbalancer.server.port: "3000"

  # ---------------- Tier 2 — Line of Business ----------------
  seller-svc:
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:catalog_pgrst_pw@catalog-db:5432/catalog
      PGRST_DB_SCHEMAS: seller
      PGRST_DB_ANON_ROLE: web_anon
    networks: [tier2_net, data_net]
    depends_on: [catalog-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier2_net
      traefik.http.routers.seller.rule: "PathPrefix(`/api/seller`)"
      traefik.http.routers.seller.middlewares: "seller-strip"
      traefik.http.middlewares.seller-strip.stripprefix.prefixes: "/api/seller"
      traefik.http.services.seller.loadbalancer.server.port: "3000"

  internal-ops-svc:
    <<: *pgrst-common
    environment:
      PGRST_DB_URI: postgres://authenticator:catalog_pgrst_pw@catalog-db:5432/catalog
      PGRST_DB_SCHEMAS: ops
      PGRST_DB_ANON_ROLE: web_anon
    networks: [tier2_net, data_net]
    depends_on: [catalog-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier2_net
      traefik.http.routers.ops.rule: "PathPrefix(`/api/ops`)"
      traefik.http.routers.ops.middlewares: "ops-strip"
      traefik.http.middlewares.ops-strip.stripprefix.prefixes: "/api/ops"
      traefik.http.services.ops.loadbalancer.server.port: "3000"

  internal-service-backend:         # Django — owns all checkout SQL (parameterized)
    build: ./internal-service-backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      INTERNAL_BACKEND_DB_PASSWORD: ${INTERNAL_BACKEND_DB_PASSWORD}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}   # same pinned realm JWK as PostgREST
    networks: [tier2_net, data_net]
    depends_on: [customer-db, orders-db, finance-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier2_net
      traefik.http.routers.internal-backend.rule: "PathPrefix(`/api/internal`)"
      traefik.http.routers.internal-backend.middlewares: "internal-backend-strip"
      traefik.http.middlewares.internal-backend-strip.stripprefix.prefixes: "/api/internal"
      traefik.http.services.internal-backend.loadbalancer.server.port: "8000"

  seller-backend:                   # Django — sellers manage own listings (catalog-db) + read own sales (orders-db)
    build: ./seller-backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      SELLER_BACKEND_DB_PASSWORD: ${SELLER_BACKEND_DB_PASSWORD}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}   # same pinned realm JWK as PostgREST
    networks: [tier2_net, data_net]
    depends_on: [catalog-db, orders-db]
    labels:
      traefik.enable: "true"
      traefik.docker.network: shopmock_tier2_net
      traefik.http.routers.seller-backend.rule: "PathPrefix(`/api/seller-backend`)"
      traefik.http.routers.seller-backend.middlewares: "seller-backend-strip"
      traefik.http.middlewares.seller-backend-strip.stripprefix.prefixes: "/api/seller-backend"
      traefik.http.services.seller-backend.loadbalancer.server.port: "8000"

  # ---------------- Data backend (private, internal network only) ----------------
  customer-db:                      # Customer PII — no public API (strictest isolation)
    <<: *pg-common
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}
      POSTGRES_DB: customer
      INTERNAL_BACKEND_DB_PASSWORD: ${INTERNAL_BACKEND_DB_PASSWORD}  # for 05 init script
    volumes:
      - ./seed/customer-db:/docker-entrypoint-initdb.d:ro,z
      - customer-data:/var/lib/postgresql/data

  catalog-db:
    <<: *pg-common
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}
      POSTGRES_DB: catalog
      SELLER_BACKEND_DB_PASSWORD: ${SELLER_BACKEND_DB_PASSWORD}    # for 05 init script
    volumes:
      - ./seed/catalog-db:/docker-entrypoint-initdb.d:ro,z
      - catalog-data:/var/lib/postgresql/data

  orders-db:
    <<: *pg-common
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}
      POSTGRES_DB: orders
      INTERNAL_BACKEND_DB_PASSWORD: ${INTERNAL_BACKEND_DB_PASSWORD}  # for 05 init script
      SELLER_BACKEND_DB_PASSWORD: ${SELLER_BACKEND_DB_PASSWORD}      # for 06 init script
    volumes:
      - ./seed/orders-db:/docker-entrypoint-initdb.d:ro,z
      - orders-data:/var/lib/postgresql/data

  finance-db:
    <<: *pg-common
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD}
      POSTGRES_DB: finance
      INTERNAL_BACKEND_DB_PASSWORD: ${INTERNAL_BACKEND_DB_PASSWORD}  # for 05 init script
    volumes:
      - ./seed/finance-db:/docker-entrypoint-initdb.d:ro,z
      - finance-data:/var/lib/postgresql/data

  # ---------------- SOC / Security Operations ----------------
  vault:
    image: hashicorp/vault:1.16
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]            # treat as mgmt-only
    networks: [soc_net, mgmt_net]

  vault-seed:                       # one-shot: runs on `up`, waits for Vault, then exits
    image: hashicorp/vault:1.16
    restart: "no"
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_ROOT_TOKEN}
    entrypoint: ["/bin/sh", "/seed/seed-secrets.sh"]
    volumes:
      - ./seed/vault:/seed:ro,z
    networks: [soc_net]
    depends_on: [vault]

  search-seed:                      # one-shot: runs on `up`, waits for OpenSearch, then exits
    image: curlimages/curl:8.7.1
    restart: "no"
    environment:
      OS_URL: https://search:9200
      OS_AUTH: admin:${OPENSEARCH_ADMIN_PASSWORD}
    entrypoint: ["/bin/sh", "/seed/index-catalog.sh"]
    volumes:
      - ./seed/search:/seed:ro,z
    networks: [edge_net]
    depends_on: [search]

  # ---------------- Tier 0 — Bastion / admin path ----------------
  bastion:
    image: lscr.io/linuxserver/openssh-server:latest
    restart: unless-stopped
    environment:
      USER_NAME: ${BASTION_USER}
      USER_PASSWORD: ${BASTION_PASSWORD}
      PASSWORD_ACCESS: "true"
      SUDO_ACCESS: "false"
    ports: ["22:2222"]              # public SSH on standard port 22 → container 2222
    networks: [mgmt_net]            # only path to Keycloak admin + Vault

  # ---------------- SIEM (on by default) ----------------
  # Wazuh manager starts with the core stack. The full single-node bundle
  # (indexer + dashboard) needs a cert bootstrap; see README.
  wazuh:
    image: wazuh/wazuh-manager:4.8.0
    restart: unless-stopped
    networks: [soc_net]

networks:
  edge_net:   {}
  tier1_net:  { internal: true }
  tier2_net:  { internal: true }
  data_net:   { internal: true }
  soc_net:    { internal: true }
  mgmt_net:   { internal: true }

volumes:
  customer-data: {}
  catalog-data: {}
  orders-data: {}
  finance-data: {}
